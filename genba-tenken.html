<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>現場点検簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root{--yellow:#FFD600;--dark:#1a1a1a;--orange:#FF6B00;--border:#e0e0e0;--sub:#666;--green:#00A651;--red:#D32F2F;--bg:#f7f7f7;--gray:#9E9E9E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--dark);min-height:100vh;color:var(--dark);}

.header{background:var(--yellow);padding:12px 16px 10px;position:sticky;top:0;z-index:200;border-bottom:4px solid var(--orange);display:flex;align-items:center;gap:10px;min-height:58px;}
.header-icon{width:34px;height:34px;background:var(--dark);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header-titles h1{font-size:16px;font-weight:900;color:var(--dark);letter-spacing:0.04em;line-height:1.2;}
.header-titles p{font-size:10px;color:#555;font-weight:500;}
.header-actions{margin-left:auto;display:flex;gap:5px;}
.btn-hdr{background:var(--dark);color:var(--yellow);border:none;border-radius:8px;padding:7px 10px;font-size:11px;font-family:inherit;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-hdr:active{opacity:0.8;}
.btn-hdr.active-tab{background:var(--orange);color:#fff;}
.btn-home{background:rgba(0,0,0,0.12);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;color:var(--dark);text-decoration:none;}
.btn-home:active{background:rgba(0,0,0,0.22);}

.page{display:none;}.page.active{display:block;}
.main{padding:14px;max-width:600px;margin:0 auto;}
.progress-bar{background:#333;border-radius:4px;height:6px;margin-bottom:14px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:4px;transition:width 0.4s;width:0%;}
.progress-label{font-size:11px;color:#aaa;text-align:right;margin-top:4px;margin-bottom:14px;}
.card{background:#fff;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.card-header{display:flex;align-items:center;gap:10px;padding:13px 16px 11px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.card-header:active{background:#f5f5f5;}
.card-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;background:var(--yellow);color:var(--dark);}
.card-num.done{background:var(--green);color:#fff;}
.card-title{font-size:15px;font-weight:700;flex:1;}
.card-subtitle{font-size:11px;color:var(--sub);font-weight:400;}
.card-chevron{font-size:13px;color:#aaa;transition:transform 0.2s;}
.card-chevron.open{transform:rotate(90deg);}
.card-body{padding:0 16px 16px;border-top:1px solid var(--border);display:none;}
.card-body.open{display:block;}
.field{margin-top:14px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;min-width:0;}
label{display:block;font-size:11px;font-weight:700;color:var(--sub);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.req{color:var(--red);margin-left:3px;}
input[type="text"],input[type="date"],select,textarea{width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 14px;font-size:16px;font-family:inherit;color:var(--dark);background:#fff;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--orange);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
.add-row{display:none;gap:8px;margin-top:8px;}
.add-row input{flex:1;}
.btn-inline-add{background:var(--dark);color:var(--yellow);border:none;border-radius:10px;padding:0 16px;font-size:22px;cursor:pointer;font-family:inherit;flex-shrink:0;height:46px;line-height:1;}
.btn-inline-add:active{opacity:0.8;}

.check-list{margin-top:10px;}
.check-item{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid #ddd;transition:border-left-color 0.2s;}
.check-item.s-ok{border-left-color:var(--green);}
.check-item.s-caution{border-left-color:var(--orange);}
.check-item.s-ng{border-left-color:var(--red);}
.check-item.s-na{border-left-color:var(--gray);}
.check-name{font-size:14px;font-weight:700;flex:1;line-height:1.4;}
.chk-btns{display:flex;gap:4px;flex-shrink:0;}
.chk-btn{width:34px;height:30px;border-radius:8px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.chk-btn.ok.on{background:var(--green);color:#fff;border-color:var(--green);}
.chk-btn.caution.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.chk-btn.ng.on{background:var(--red);color:#fff;border-color:var(--red);}
.chk-btn.na.on{background:var(--gray);color:#fff;border-color:var(--gray);}
.chk-note{margin-top:8px;display:none;}
.chk-note.show{display:block;}
.chk-note textarea{min-height:52px;font-size:14px;}
.check-ampm-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.ampm-lbl{font-size:11px;font-weight:900;color:var(--sub);width:24px;flex-shrink:0;letter-spacing:0.02em;}
.chk-footer{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
.chk-stat{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.chk-stat.ok{background:#E8F5E9;color:var(--green);}
.chk-stat.caution{background:#FFF3E0;color:var(--orange);}
.chk-stat.ng{background:#FFEBEE;color:var(--red);}

.btn-submit{width:100%;background:linear-gradient(135deg,var(--yellow),var(--orange));color:var(--dark);border:none;border-radius:16px;padding:18px;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:0.05em;box-shadow:0 4px 20px rgba(255,107,0,.4);margin-bottom:8px;transition:transform 0.1s;}
.btn-submit:active{transform:scale(0.98);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-reset{width:100%;background:transparent;border:2px solid #555;border-radius:16px;padding:14px;font-size:14px;font-weight:700;color:#aaa;cursor:pointer;font-family:inherit;margin-bottom:8px;}

#preview-panel{display:none;background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.preview-title{font-size:19px;font-weight:900;text-align:center;border-bottom:4px solid var(--yellow);padding-bottom:12px;margin-bottom:16px;letter-spacing:0.1em;}
.preview-section{margin-bottom:14px;}
.preview-section h3{font-size:12px;font-weight:900;color:#fff;background:var(--dark);padding:4px 12px;border-radius:6px;margin-bottom:8px;display:inline-block;}
.pt{width:100%;border-collapse:collapse;font-size:13px;}
.pt th{background:#f5f5f5;text-align:left;padding:7px 10px;font-weight:700;border:1px solid var(--border);width:30%;vertical-align:top;}
.pt td{padding:7px 10px;border:1px solid var(--border);vertical-align:top;line-height:1.5;}
.pv-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);gap:8px;}
.pv-row:last-child{border-bottom:none;}
.pv-name{font-size:13px;flex:1;}
.pv-note{font-size:11px;color:var(--sub);margin-top:2px;}
.pv-st{font-weight:900;font-size:16px;flex-shrink:0;}
.pv-st.ok{color:var(--green);}
.pv-st.caution{color:var(--orange);}
.pv-st.ng{color:var(--red);}
.pv-st.na{color:var(--gray);}
.pv-ampm{display:flex;align-items:center;gap:6px;margin-top:2px;}
.pv-albl{font-size:10px;font-weight:700;color:var(--sub);}

.list-page{padding:14px;max-width:600px;margin:0 auto;}
.list-filter{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.list-filter select,.list-filter input[type="month"]{flex:1;min-width:120px;border:2px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--dark);background:#fff;outline:none;-webkit-appearance:none;}
.list-filter select:focus,.list-filter input:focus{border-color:var(--orange);}
.list-summary{display:flex;gap:8px;margin-bottom:14px;}
.summary-card{flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.summary-card .s-num{font-size:24px;font-weight:900;color:var(--orange);line-height:1;}
.summary-card .s-label{font-size:10px;color:var(--sub);font-weight:700;margin-top:3px;letter-spacing:0.06em;}
.record-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.rec-header{padding:14px 16px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.rec-header:active{background:#f5f5f5;}
.r-badge{background:var(--dark);color:var(--yellow);border-radius:10px;padding:6px 10px;text-align:center;flex-shrink:0;min-width:54px;}
.r-badge .r-month{font-size:10px;font-weight:700;line-height:1;}
.r-badge .r-day{font-size:22px;font-weight:900;line-height:1.1;}
.r-badge .r-dow{font-size:10px;font-weight:700;line-height:1.2;}
.r-info{flex:1;min-width:0;}
.r-site{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-meta{font-size:12px;color:var(--sub);margin-top:3px;}
.r-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.r-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--sub);}
.r-tag.ng{background:#FFEBEE;color:var(--red);}
.r-tag.caution{background:#FFF3E0;color:var(--orange);}
.r-chevron{font-size:13px;color:#ccc;flex-shrink:0;}
.rec-detail{display:none;border-top:1px solid var(--border);}
.rec-detail.open{display:block;}
.rec-detail-inner{padding:16px;}
.detail-sec{margin-bottom:14px;}
.detail-sec:last-child{margin-bottom:0;}
.detail-sec-title{font-size:11px;font-weight:900;color:#fff;background:var(--dark);padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;letter-spacing:0.06em;}
.detail-table{width:100%;border-collapse:collapse;font-size:12px;}
.detail-table th{background:#f5f5f5;text-align:left;padding:6px 8px;font-weight:700;border:1px solid var(--border);vertical-align:top;}
.detail-table td{padding:6px 8px;border:1px solid var(--border);vertical-align:middle;line-height:1.5;}
.rec-actions{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:#fafafa;}
.btn-rp{flex:1;background:var(--dark);color:var(--yellow);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-re{flex:1;background:var(--yellow);color:var(--dark);border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-rd{background:transparent;border:2px solid #eee;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#ccc;}
.list-empty{text-align:center;padding:48px 16px;color:#888;}
.list-empty .ei{font-size:48px;margin-bottom:12px;}
.list-empty p{font-size:14px;line-height:1.7;}

.settings-page{padding:14px;max-width:600px;margin:0 auto;}
.ss{background:#fff;border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.ss-head{background:var(--dark);padding:14px 16px;display:flex;align-items:center;gap:10px;}
.ss-head .si{font-size:18px;}
.ss-head h2{font-size:14px;font-weight:900;color:var(--yellow);letter-spacing:0.05em;flex:1;}
.ss-body{padding:16px;}
.si-list{margin-bottom:12px;}
.si-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;}
.si-item span{flex:1;font-size:15px;color:var(--dark);}
.btn-si-del{background:transparent;border:2px solid #ffcdd2;border-radius:6px;width:28px;height:28px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0;color:var(--red);}
.btn-si-del:active{background:#ffebee;}
.sa-row{display:flex;gap:8px;}
.sa-row input{flex:1;border:2px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;font-family:inherit;color:var(--dark);outline:none;-webkit-appearance:none;}
.sa-row input:focus{border-color:var(--orange);}
.btn-sa{background:var(--dark);color:var(--yellow);border:none;border-radius:10px;padding:0 18px;font-size:22px;cursor:pointer;font-family:inherit;flex-shrink:0;height:46px;}
.btn-sa:active{opacity:0.8;}
.settings-hint{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6;}
.settings-reset-btn{width:100%;background:transparent;border:2px dashed var(--border);border-radius:10px;padding:10px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit;margin-top:8px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:400;}
.toast.show{opacity:1;}

@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .header,.progress-bar,.progress-label,.card,.btn-submit,.btn-reset,#page-list,#page-settings,.toast{display:none!important;}
  #preview-panel{display:block!important;box-shadow:none;padding:0;margin:0;border-radius:0;}
  body{background:#fff;}
  .main{max-width:none!important;padding:0!important;margin:0!important;}
  #page-form{display:block!important;padding:0!important;}
  .print-page{width:210mm;min-height:297mm;margin:0 auto;padding:12mm 15mm 15mm;box-sizing:border-box;}
  .print-header{display:flex!important;align-items:center;border-bottom:3px solid #1a1a1a;padding-bottom:10px;margin-bottom:14px;}
  .print-logo{background:#1a1a1a;color:#FFD600;font-size:13px;font-weight:900;padding:4px 10px;border-radius:4px;margin-right:10px;}
  .print-h-title{font-size:20px;font-weight:900;letter-spacing:0.08em;flex:1;}
  .print-date-box{font-size:11px;color:#444;text-align:right;}
  .print-section{margin-bottom:10px;}
  .pst{background:#1a1a1a;color:#FFD600;font-size:11px;font-weight:900;padding:3px 8px;display:inline-block;letter-spacing:0.08em;margin-bottom:5px;border-radius:3px;}
  .print-table{width:100%;border-collapse:collapse;font-size:12px;}
  .print-table th{background:#f0f0f0;text-align:left;padding:5px 8px;font-weight:700;border:1px solid #ccc;width:28%;vertical-align:top;}
  .print-table td{padding:5px 8px;border:1px solid #ccc;vertical-align:top;line-height:1.5;}
  .p-chk-table{width:100%;border-collapse:collapse;font-size:11px;}
  .p-chk-table th{background:#f0f0f0;padding:4px 6px;font-weight:700;border:1px solid #ccc;text-align:center;}
  .p-chk-table th:first-child{text-align:left;width:50%;}
  .p-chk-table td{padding:4px 5px;border:1px solid #ccc;text-align:center;vertical-align:middle;}
  .p-chk-table td:first-child{text-align:left;line-height:1.4;}
  .p-chk-table td.nc{font-size:10px;text-align:left;color:#555;}
  .psok{color:#00A651;font-weight:900;font-size:13px;}
  .pscau{color:#FF6B00;font-weight:900;font-size:13px;}
  .psng{color:#D32F2F;font-weight:900;font-size:13px;}
  .psna{color:#9E9E9E;font-weight:900;font-size:13px;}
  .psnone{color:#bbb;}
  .print-sign{display:flex!important;gap:16px;margin-top:12px;}
  .print-sign-box{flex:1;border:1px solid #ccc;border-radius:4px;padding:10px;text-align:center;}
  .psbl{font-size:10px;color:#666;margin-bottom:22px;}
  .psll{border-top:1px solid #ccc;margin-top:8px;padding-top:4px;font-size:10px;color:#999;}
}
</style>
</head>
<body>

<div class="header">
  <a class="btn-home" href="index.html">🏠</a>
  <div class="header-icon">🏗️</div>
  <div class="header-titles">
    <h1>現場点検簿</h1>
    <p>安全設備・作業環境の点検ツール</p>
  </div>
  <div class="header-actions">
    <button class="btn-hdr active-tab" id="tab-form-btn" onclick="showPage('form')">✏️ 入力</button>
    <button class="btn-hdr" id="tab-list-btn" onclick="showPage('list')">📋 一覧</button>
    <button class="btn-hdr" id="tab-settings-btn" onclick="showPage('settings')">⚙️ 設定</button>
  </div>
</div>

<div class="page active" id="page-form">
  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 4 セクション完了</div>
    <div id="formCards"></div>
    <div id="preview-panel">
      <div class="print-page">
        <div class="print-header" style="display:none;">
          <div class="print-logo">現場点検</div>
          <div class="print-h-title">現場点検簿</div>
          <div class="print-date-box" id="printDateBox"></div>
        </div>
        <div class="preview-title">現場点検簿</div>
        <div id="previewContent"></div>
      </div>
    </div>
    <button class="btn-submit" id="btnPreview" onclick="togglePreview()">👁️ プレビュー・印刷</button>
    <button class="btn-submit" id="btnSave" onclick="saveRecord()" disabled>✅ 点検記録を保存</button>
    <button class="btn-reset" onclick="confirmReset()">🔄 入力をリセット</button>
  </div>
</div>

<div class="page" id="page-list">
  <div class="list-page">
    <div class="list-filter" id="listFilter"></div>
    <div class="list-summary" id="listSummary"></div>
    <div id="listContainer"></div>
  </div>
</div>

<div class="page" id="page-settings">
  <div class="settings-page" id="settingsContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   ★ Firebaseコンソールから取得したconfigをここに貼り付けてください
   ============================================================ */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.firebasestorage.app",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db, _fbReady = false;
try {
  if (firebaseConfig.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    _fbReady = true;
  }
} catch(e) { console.error('Firebase init error:', e); }

const DAYS = ['日','月','火','水','木','金','土'];
const SK = {r:'genba_records', s:'genba_settings', d:'genba_draft'};
const DEF = {
  sites:['第1工区','第2工区','管理棟','外構工事'],
  inspectors:['山田太郎','鈴木一郎','田中花子'],
  safetyItems:['足場・作業台の状態','手すり・中さんの設置','安全ネット・朝顔の設置','開口部・孔部の養生','落下物防止措置','立入禁止区画の設置','誘導員・監視員の配置','保護具の着用確認'],
  envItems:['整理整頓・清掃状況','通路・避難経路の確保','照明・採光の確保','粉塵・ガスの対策','騒音・振動対策','熱中症・寒冷対策','仮設電気設備の安全確認','危険物・化学物質の管理']
};

let records, settings, draft, editId = null;

async function load() {
  // --- 設定の読み込み ---
  if (_fbReady) {
    try {
      const doc = await db.collection('tenkenSettings').doc('genba').get();
      if (doc.exists) {
        settings = doc.data();
      } else {
        settings = JSON.parse(JSON.stringify(DEF));
        await db.collection('tenkenSettings').doc('genba').set(settings);
      }
    } catch(e) {
      console.warn('Firestore settings load failed, using localStorage', e);
      settings = JSON.parse(localStorage.getItem(SK.s)) || JSON.parse(JSON.stringify(DEF));
    }
  } else {
    settings = JSON.parse(localStorage.getItem(SK.s)) || JSON.parse(JSON.stringify(DEF));
  }

  // --- 記録の読み込み ---
  if (_fbReady) {
    try {
      const snap = await db.collection('genbaRecords').orderBy('id','desc').get();
      records = snap.docs.map(d => d.data());
    } catch(e) {
      console.warn('Firestore records load failed, using localStorage', e);
      records = JSON.parse(localStorage.getItem(SK.r)) || [];
    }
  } else {
    records = JSON.parse(localStorage.getItem(SK.r)) || [];
  }

  // localStorageにキャッシュ
  localStorage.setItem(SK.s, JSON.stringify(settings));
  localStorage.setItem(SK.r, JSON.stringify(records));

  // ドラフトはlocalStorageのみ（端末固有）
  draft = JSON.parse(localStorage.getItem(SK.d)) || newDraft();
  if (!draft.date) draft.date = today();
  syncChecks(draft, settings);
}

function today() { return new Date().toISOString().split('T')[0]; }

function newDraft() {
  return {
    date:today(), site:'', weather:'', inspector:'',
    safetyChecks: (settings.safetyItems||[]).map(n=>mkAP(n)),
    envChecks:    (settings.envItems||[]).map(n=>mkAP(n)),
    summary:'', confirmer:''
  };
}
const mkAP = n => ({name:n, amStatus:null, pmStatus:null, note:''});

function syncChecks(d, s) {
  d.safetyChecks = mergeAP(d.safetyChecks, s.safetyItems);
  d.envChecks    = mergeAP(d.envChecks,    s.envItems);
}

function mergeAP(existing, items) {
  return (items||[]).map(name => {
    const ex = (existing||[]).find(c=>c.name===name);
    if (!ex) return mkAP(name);
    if ('status' in ex && !('amStatus' in ex))
      return {name, amStatus:ex.status, pmStatus:ex.status, note:ex.note||''};
    return ex;
  });
}

function saveDraft() {
  draft.date      = v('inspDate');

  draft.inspector = v('inspector');

}

function optsAdd(items, sel, lbl) { return opts(items,sel)+`<option value="__new__">${lbl}</option>`; }
function optsBlank(items, sel) {

/* ---- CHECKLIST ---- */
function apBtns(type, i, slot, status) {
  return ['ok','caution','ng','na'].map(s =>
    `<button class="chk-btn ${s}${status===s?' on':''}" onclick="setAP('${type}',${i},'${slot}','${s}')" title="${{ok:'良好',caution:'要注意',ng:'不良',na:'該当なし'}[s]}">${{ok:'◯',caution:'△',ng:'×',na:'ー'}[s]}</button>`
  ).join('');
}

function renderAPChecklist(type) {
  const checks = type==='safety' ? draft.safetyChecks : draft.envChecks;
  el(type+'CheckList').innerHTML = checks.map((c,i) => {
    const cls = worstClass(c.amStatus, c.pmStatus);
    const showNote = c.amStatus==='caution'||c.amStatus==='ng'||c.pmStatus==='caution'||c.pmStatus==='ng';
    return `<div class="check-item${cls?' s-'+cls:''}" id="${type}Item${i}">
      <div class="check-name">${escHtml(c.name)}</div>
      <div class="check-ampm-row" id="${type}AM${i}">
        <span class="ampm-lbl">午前</span>
        <div class="chk-btns">${apBtns(type,i,'am',c.amStatus)}</div>
      </div>
      <div class="check-ampm-row" id="${type}PM${i}">
        <span class="ampm-lbl">午後</span>
        <div class="chk-btns">${apBtns(type,i,'pm',c.pmStatus)}</div>
      </div>
      <div class="chk-note${showNote?' show':''}" id="${type}Note${i}">
        <textarea placeholder="備考・処置内容を入力" oninput="setNote('${type}',${i},this.value)">${escHtml(c.note||'')}</textarea>
      </div>
    </div>`;
  }).join('');
  updateCheckFooter(type);
}

function getChecks(type) { return type==='safety' ? draft.safetyChecks : draft.envChecks; }

function setAP(type, i, slot, status) {
  const c = getChecks(type)[i];
  const key = slot==='am' ? 'amStatus' : 'pmStatus';
  c[key] = c[key]===status ? null : status;
  const cls = worstClass(c.amStatus, c.pmStatus);
  el(`${type}Item${i}`).className = 'check-item'+(cls?' s-'+cls:'');
  const row = el(`${type}${slot==='am'?'AM':'PM'}${i}`);
  row.querySelectorAll('.chk-btn').forEach((b,bi) => {
    const ss = ['ok','caution','ng','na'][bi];
    b.className = `chk-btn ${ss}${c[key]===ss?' on':''}`;
  });
  const showNote = c.amStatus==='caution'||c.amStatus==='ng'||c.pmStatus==='caution'||c.pmStatus==='ng';
  el(`${type}Note${i}`).className = 'chk-note'+(showNote?' show':'');
  updateCheckFooter(type); saveDraft(); updateProgress();
}

function setNote(type, i, val) { getChecks(type)[i].note = val; saveDraft(); }

function worstClass(a, b) {
  const s = [a,b].filter(Boolean);
  if (s.includes('ng'))      return 'ng';
  if (s.includes('caution')) return 'caution';
  if (s.includes('ok'))      return 'ok';
  if (s.includes('na'))      return 'na';
  return null;
}

function updateCheckFooter(type) {
  const checks = getChecks(type);
  let ok=0, cau=0, ng=0;
  checks.forEach(c => {
    const w = worstClass(c.amStatus, c.pmStatus);
    if (w==='ng') ng++; else if (w==='caution') cau++; else if (w==='ok'||w==='na') ok++;
  });
  let h='';
  if (ok)  h+=`<span class="chk-stat ok">◯/ー 良好 ${ok}件</span>`;
  if (cau) h+=`<span class="chk-stat caution">△ 要注意 ${cau}件</span>`;
  if (ng)  h+=`<span class="chk-stat ng">× 不良 ${ng}件</span>`;
  el(type+'Footer').innerHTML = h;
}

/* ---- PROGRESS ---- */
function updateProgress() {
  const d = draft;
  let done = 0;
  if (d.date && d.site && d.inspector) done++;
  const s1 = d.safetyChecks && d.safetyChecks.length && d.safetyChecks.every(c=>c.amStatus && c.pmStatus);
  const s2 = d.envChecks    && d.envChecks.length    && d.envChecks.every(c=>c.amStatus && c.pmStatus);
  if (s1) done++; if (s2) done++;
  if (d.summary && d.summary.trim()) done++;
  markCard(1, d.date&&d.site&&d.inspector);
  markCard(2, s1); markCard(3, s2);
  markCard(4, d.summary&&d.summary.trim());
  el('progressFill').style.width = Math.round(done/4*100)+'%';
  el('progressLabel').textContent = `${done} / 4 セクション完了`;
  el('btnSave').disabled = !(d.date && d.site && d.inspector);
}
function markCard(n, ok) { const e=el('num'+n); if(e) e.className='card-num'+(ok?' done':''); }

function toggleCard(n) {
  const b=el('body'+n), c=el('chev'+n), open=b.classList.contains('open');
  b.classList.toggle('open',!open); c.classList.toggle('open',!open);
}
function onSel(selId, rowId, inputId) {
  if (el(selId).value==='__new__') { el(selId).value=''; el(rowId).style.display='flex'; el(inputId).focus(); }
  else { saveDraft(); updateProgress(); }
}
function addSite() { addToList('sites','siteInput','siteName','siteAddRow','新規現場を追加...'); }
function addInspector() {
  const val=el('inspInput').value.trim(); if(!val) return;
  if(!settings.inspectors.includes(val)) { settings.inspectors.push(val); saveSettings(); }
  el('inspector').innerHTML = optsAdd(settings.inspectors, val, '新規点検者を追加...');
  el('inspector').value = val;
  if(el('confirmer')) el('confirmer').innerHTML = optsBlank(settings.inspectors, v('confirmer'));
  el('inspAddRow').style.display='none'; el('inspInput').value=''; saveDraft();
}
function addToList(key, inputId, selId, rowId, addLbl) {
  const val=el(inputId).value.trim(); if(!val) return;
  if(!settings[key].includes(val)) { settings[key].push(val); saveSettings(); }
  el(selId).innerHTML = optsAdd(settings[key], val, addLbl);
  el(selId).value = val;
  el(rowId).style.display='none'; el(inputId).value=''; saveDraft(); updateProgress();
}
function saveSettings() {
  localStorage.setItem(SK.s, JSON.stringify(settings));
  if (_fbReady) {
    db.collection('tenkenSettings').doc('genba').set(settings)
      .catch(e => console.warn('Firestore saveSettings failed', e));
  }
}

function symHTML(status) {

function apPreviewSection(title, checks) {
  if (!checks.length) return '';

    return `<div class="pv-row" style="flex-direction:column;align-items:flex-start;">

      <div class="pv-ampm">
        <span class="pv-albl">午前</span>${symHTML(c.amStatus)}
        <span class="pv-albl" style="margin-left:8px">午後</span>${symHTML(c.pmStatus)}
      </div>
      ${note}
    </div>`;
  }).join('');
  return `<div class="preview-section"><h3>${title}</h3>${rows}</div>`;
}

/* ---- SAVE / RESET ---- */
function saveRecord() {
  saveDraft();
  if (!draft.date || !draft.site || !draft.inspector) { showToast('必須項目を入力してください'); return; }
  const d = JSON.parse(JSON.stringify(draft));
  let savedRecord;
  if (editId) {
    const idx = records.findIndex(r=>r.id===editId);
    savedRecord = {...d, id:editId};
    if (idx>=0) records[idx]=savedRecord; else records.unshift(savedRecord);
    editId=null; showToast('点検記録を更新しました');
  } else {
    savedRecord = {...d, id:Date.now()};
    records.unshift(savedRecord); showToast('点検記録を保存しました');
  }
  // Firestore保存
  if (_fbReady) {
    db.collection('genbaRecords').doc(String(savedRecord.id)).set(savedRecord)
      .catch(e => console.warn('Firestore saveRecord failed', e));
  }
  draft = newDraft(); syncChecks(draft, settings);
  localStorage.setItem(SK.r, JSON.stringify(records));
  localStorage.setItem(SK.d, JSON.stringify(draft));
  renderFormCards();
  el('preview-panel').style.display='none';
  el('btnPreview').textContent='👁️ プレビュー・印刷';
  showPage('list');
}

function confirmReset() { if(confirm('入力内容をリセットしますか？')) resetForm(); }
function resetForm() {
  editId=null; draft=newDraft(); syncChecks(draft,settings);
  localStorage.setItem(SK.d, JSON.stringify(draft));
  renderFormCards();
  el('preview-panel').style.display='none';
  el('btnPreview').textContent='👁️ プレビュー・印刷';
  showToast('リセットしました');
}

/* ---- LIST ---- */
function setFilterMonth() {
  const m=el('filterMonth');
  if(m){const d=new Date();m.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
}

function renderList() {
  el('listFilter').innerHTML = `
    <input type="month" id="filterMonth" onchange="renderList()">
    <select id="filterSite" onchange="renderList()"><option value="">すべての現場</option>${settings.sites.map(s=>`<option>${escHtml(s)}</option>`).join('')}</select>
    <select id="filterResult" onchange="renderList()">
      <option value="">すべての結果</option>
      <option value="ng">不良あり</option>
      <option value="caution">要注意あり</option>
      <option value="ok">全項目良好</option>
    </select>`;
  setFilterMonth();
  const month  = el('filterMonth')  ? el('filterMonth').value  : '';
  const site   = el('filterSite')   ? el('filterSite').value   : '';
  const result = el('filterResult') ? el('filterResult').value : '';

  let recs = records.filter(r => {
    if (month && !r.date.startsWith(month)) return false;
    if (site  && r.site!==site) return false;
    if (result) {
      const ws = recordStatuses(r);
      if (result==='ng'      && !ws.some(s=>s==='ng'))            return false;
      if (result==='caution' && !ws.some(s=>s==='caution'))       return false;
      if (result==='ok'      && !ws.every(s=>s==='ok'||s==='na'||!s)) return false;
    }
    return true;
  });

  const totalNg = recs.reduce((n,r)=>n+recordStatuses(r).filter(s=>s==='ng').length,0);
  el('listSummary').innerHTML = `
    <div class="summary-card"><div class="s-num">${recs.length}</div><div class="s-label">点検件数</div></div>
    <div class="summary-card"><div class="s-num">${recs.filter(r=>recordStatuses(r).includes('ng')).length}</div><div class="s-label">不良あり</div></div>
    <div class="summary-card"><div class="s-num">${totalNg}</div><div class="s-label">不良項目数</div></div>`;

  if (!recs.length) {
    el('listContainer').innerHTML=`<div class="list-empty"><div class="ei">🏗️</div><p>点検記録がありません。<br>「入力」タブから記録してください。</p></div>`;
    return;
  }
  el('listContainer').innerHTML = recs.map(r => {
    const pd=parseDate(r.date);
    const ws=recordStatuses(r);
    const ngC=ws.filter(s=>s==='ng').length, cauC=ws.filter(s=>s==='caution').length;
    let tags = ngC?`<span class="r-tag ng">× 不良 ${ngC}件</span>`:'';
    tags += cauC?`<span class="r-tag caution">△ 要注意 ${cauC}件</span>`:'';
    if(!ngC&&!cauC) tags=`<span class="r-tag">◯ 異常なし</span>`;
    return `<div class="record-card">
      <div class="rec-header" onclick="toggleRec(${r.id})">
        <div class="r-badge"><div class="r-month">${pd.month}月</div><div class="r-day">${pd.day}</div><div class="r-dow">${pd.dow}</div></div>
        <div class="r-info"><div class="r-site">${escHtml(r.site||'')}</div><div class="r-meta">点検者：${escHtml(r.inspector||'')} ${escHtml(r.weather||'')}</div><div class="r-tags">${tags}</div></div>
        <div class="r-chevron" id="rchev${r.id}">▶</div>
      </div>
      <div class="rec-detail" id="rdetail${r.id}">
        <div class="rec-detail-inner">${buildDetailHTML(r)}</div>
        <div class="rec-actions">
          <button class="btn-rp" onclick="printRecord(${r.id})">🖨️ 印刷</button>
          <button class="btn-re" onclick="editRecord(${r.id})">✏️ 編集</button>
          <button class="btn-rd" onclick="deleteRecord(${r.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function recordStatuses(r) {
  return [...(r.safetyChecks||[]),...(r.envChecks||[])].map(c => {
    if ('amStatus' in c) return worstClass(c.amStatus, c.pmStatus);
    return c.status;
  });
}

function toggleRec(id) {
  const det=el('rdetail'+id), chev=el('rchev'+id);
  det.classList.toggle('open');
  chev.style.transform=det.classList.contains('open')?'rotate(90deg)':'';
}

function buildDetailHTML(r) {
  let h=`<div class="detail-sec"><span class="detail-sec-title">📅 基本情報</span>
    <table class="detail-table">
      <tr><th>点検日</th><td>${r.date?formatDate(r.date):''}</td></tr>
      <tr><th>現場名</th><td>${escHtml(r.site||'')}</td></tr>
      <tr><th>天候</th><td>${escHtml(r.weather||'')}</td></tr>
      <tr><th>点検者</th><td>${escHtml(r.inspector||'')}</td></tr>
    </table></div>`;
  h+=detailAPChecks('🦺 安全設備点検',r.safetyChecks||[]);
  h+=detailAPChecks('🌿 作業環境点検',r.envChecks||[]);
  if(r.summary) h+=`<div class="detail-sec"><span class="detail-sec-title">📝 総合評価</span><div style="font-size:13px;line-height:1.6;padding:8px 0;white-space:pre-wrap">${escHtml(r.summary)}</div></div>`;
  return h;
}

function symSm(s) {
  if(s==='ok')      return '<span style="color:var(--green);font-weight:900">◯</span>';
  if(s==='caution') return '<span style="color:var(--orange);font-weight:900">△</span>';
  if(s==='ng')      return '<span style="color:var(--red);font-weight:900">×</span>';
  if(s==='na')      return '<span style="color:var(--gray);font-weight:700">ー</span>';
  return '－';
}

function detailAPChecks(title, checks) {
  if(!checks.length) return '';
  const rows = checks.map(c => {
    if ('amStatus' in c) {
      return `<tr>
        <td>${escHtml(c.name)}</td>
        <td style="text-align:center">${symSm(c.amStatus)}</td>
        <td style="text-align:center">${symSm(c.pmStatus)}</td>
        <td style="font-size:11px">${escHtml(c.note||'')}</td>
      </tr>`;
    }
    return `<tr><td>${escHtml(c.name)}</td><td colspan="2" style="text-align:center">${symSm(c.status)}</td><td></td></tr>`;
  }).join('');
  return `<div class="detail-sec"><span class="detail-sec-title">${title}</span>
    <table class="detail-table">
      <tr><th style="width:48%">項目</th><th style="width:12%;text-align:center">午前</th><th style="width:12%;text-align:center">午後</th><th>備考</th></tr>
      ${rows}
    </table></div>`;
}

function printRecord(id) {
  const r=records.find(r=>r.id===id); if(!r) return;
  buildPreview(r);
  el('preview-panel').style.display='block';
  showPage('form');
  setTimeout(()=>{ window.print(); el('preview-panel').style.display='none'; showPage('list'); },200);
}

function editRecord(id) {
  const r=records.find(r=>r.id===id); if(!r) return;
  editId=id; draft=JSON.parse(JSON.stringify(r)); delete draft.id;
  localStorage.setItem(SK.d, JSON.stringify(draft));
  renderFormCards(); showPage('form'); showToast('編集モードで開きました');
}

function deleteRecord(id) {
  if(!confirm('この点検記録を削除しますか？')) return;
  records=records.filter(r=>r.id!==id);
  localStorage.setItem(SK.r, JSON.stringify(records));
  if (_fbReady) {
    db.collection('genbaRecords').doc(String(id)).delete()
      .catch(e => console.warn('Firestore deleteRecord failed', e));
  }
  renderList(); showToast('削除しました');
}

/* ---- SETTINGS ---- */
function renderSettings() {
  const fbBadge = _fbReady
    ? `<span style="padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;background:#E8F5E9;color:#2E7D32;">✅ 接続済み・正常動作中</span>`
    : `<span style="padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;background:#FFEBEE;color:#C62828;">❌ 未設定 — configを入力してください</span>`;
  let h=`<div class="ss"><div class="ss-head"><span class="si">🔥</span><h2>Firebase 接続状態</h2></div>
    <div class="ss-body">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <span style="font-size:13px;font-weight:700;color:#444;">接続状態：</span>${fbBadge}
      </div>
      <div style="background:var(--bg);border-radius:10px;padding:12px 14px;">
        <p style="font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px;">📋 未設定の場合の設定方法</p>
        <p style="font-size:12px;color:#444;line-height:2.0;">
          ① <b>console.firebase.google.com</b> でプロジェクト作成<br>
          ② Firestoreデータベースを作成（テストモード）<br>
          ③ プロジェクト設定 → ウェブアプリ追加 → Config をコピー<br>
          ④ このHTMLの <code style="background:#f0f0f0;padding:2px 5px;border-radius:3px;">firebaseConfig</code> に貼り付け
        </p>
      </div>
    </div></div>`;
  h+=ssec('🏗️','現場名','sites','newSiteInput','現場名を追加');
  h+=ssec('👷','点検者','inspectors','newInspInput','氏名を追加');
  h+=ssec('🦺','安全設備点検項目','safetyItems','newSafetyInput','点検項目を追加',true);
  h+=ssec('🌿','作業環境点検項目','envItems','newEnvInput','点検項目を追加',true);
  h+=`<div class="ss"><div class="ss-head"><span class="si">⚠️</span><h2>データ管理</h2></div>
    <div class="ss-body"><button class="settings-reset-btn" onclick="resetAllData()">🗑️ すべてのデータを削除する</button></div></div>`;
  el('settingsContainer').innerHTML=h;
  ['sites','inspectors','safetyItems','envItems'].forEach(renderSList);
}

function ssec(icon, title, key, inputId, ph, isCheck) {
  return `<div class="ss"><div class="ss-head"><span class="si">${icon}</span><h2>${title}</h2></div>
    <div class="ss-body">
      <div class="si-list" id="sl_${key}"></div>
      <div class="sa-row"><input type="text" id="${inputId}" placeholder="${ph}">
      <button class="btn-sa" onclick="sAdd('${key}','${inputId}',${!!isCheck})">+</button></div>
      ${isCheck?'<p class="settings-hint">項目を削除すると新規点検に反映されます。過去の記録には影響しません。</p>':''}
    </div></div>`;
}

function renderSList(key) {
  const c=el('sl_'+key); if(!c) return;
  c.innerHTML=(settings[key]||[]).map((item,i)=>
    `<div class="si-item"><span>${escHtml(item)}</span><button class="btn-si-del" onclick="sDel('${key}',${i})">×</button></div>`
  ).join('')||'<div style="color:var(--sub);font-size:13px;padding:8px 0">項目がありません</div>';
}

function sAdd(key, inputId, isCheck) {
  const val=el(inputId).value.trim(); if(!val) return;
  if((settings[key]||[]).includes(val)){ showToast('すでに登録されています'); return; }
  (settings[key]=settings[key]||[]).push(val);
  el(inputId).value=''; saveSettings(); renderSList(key);
  if(isCheck){ syncChecks(draft,settings); renderFormCards(); }
  showToast('追加しました');
}

function sDel(key, idx) {
  settings[key].splice(idx,1); saveSettings(); renderSList(key);
  syncChecks(draft,settings); renderFormCards();
}

async function resetAllData() {
  if(!confirm('すべての記録と設定を削除します。元に戻せません。')) return;
  Object.values(SK).forEach(k=>localStorage.removeItem(k));
  if (_fbReady) {
    try {
      await db.collection('tenkenSettings').doc('genba').delete();
      const snap = await db.collection('genbaRecords').get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    } catch(e) { console.warn('Firestore resetAllData failed', e); }
  }
  await load(); renderFormCards(); renderList(); renderSettings(); showToast('削除しました');
}

/* ---- PAGE / TOAST ---- */
function showPage(name) {
  ['form','list','settings'].forEach(p=>{
    el('page-'+p).classList.toggle('active',p===name);
    const b=el('tab-'+p+'-btn'); if(b) b.classList.toggle('active-tab',p===name);
  });
  if(name==='list') renderList();
  if(name==='settings') renderSettings();
}

let toastTimer;
function showToast(msg) {
  const t=el('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function el(id) { return document.getElementById(id); }
function v(id)  { const e=el(id); return e?e.value:''; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return escHtml(s); }
function formatDate(s) {
  if(!s) return '';
  const d=new Date(s+'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;
}
function parseDate(s) {
  if(!s) return {month:'',day:'',dow:''};
  const d=new Date(s+'T00:00:00');
  return {month:d.getMonth()+1, day:d.getDate(), dow:DAYS[d.getDay()]};
}

document.addEventListener('DOMContentLoaded', async () => { await load(); renderFormCards(); setFilterMonth(); });
</script>
</body>
</html>
